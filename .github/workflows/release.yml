name: Release

on:
  push:
    tags: ['v*']          # pushing a v* tag builds and publishes a release
  workflow_dispatch:      # allow manual runs for testing

permissions:
  contents: write         # needed to create the release / upload assets

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Resolve version from tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = ($tag -replace '^v', '')
          if ($ver -notmatch '^\d+\.\d+\.\d+(\.\d+)?$') { $ver = '1.0.0' }
          "VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "Resolved version: $ver"

      - name: Fetch bundled ffmpeg
        shell: pwsh
        run: pwsh scripts/fetch-ffmpeg.ps1

      - name: Publish (self-contained single file, win-x64)
        shell: pwsh
        run: |
          dotnet publish src/ScreenPaste/ScreenPaste.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=$env:VERSION -p:FileVersion=$env:VERSION -p:AssemblyVersion=$env:VERSION `
            -o publish

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "/DMyAppVersion=$env:VERSION" installer\ScreenPaste.iss
          $setup = "dist\ScreenPaste-$env:VERSION-setup.exe"
          if (-not (Test-Path $setup)) { throw "Installer not found at $setup" }
          "ASSET_SETUP=$setup" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Package portable zip
        shell: pwsh
        run: |
          $zip = "dist\ScreenPaste-$env:VERSION-win-x64-portable.zip"
          Compress-Archive -Path publish/ScreenPaste.exe, publish/ffmpeg -DestinationPath $zip -Force
          "ASSET_ZIP=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Create release and upload assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ env.ASSET_SETUP }}
            ${{ env.ASSET_ZIP }}

      - name: Upload build artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ScreenPaste-win-x64
          path: dist/*
